name: KAIF Conformance Suite

on:
  push:
    branches: [main]
  pull_request:

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build conformance package
        run: pnpm --filter @kaif/conformance build

      - name: Start KAIF stack
        run: KAIF_DEV_MODE=true docker compose up -d --build

      - name: Wait for KAIF server health
        run: |
          set -euo pipefail
          echo "Waiting for KAIF server..."
          for i in $(seq 1 45); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Server healthy after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: KAIF server did not become healthy within 90s"
          docker compose ps
          docker compose logs --tail=120 spire-server spire-init spire-agent kaif-server redis || true
          exit 1
        shell: bash

      - name: Bootstrap test delegation grant
        run: |
          if [ -n "$CI_OIDC_TOKEN" ]; then
            ID_TOKEN="$CI_OIDC_TOKEN"
          else
            ID_TOKEN="dev-mock-token"
          fi
          GRANT_RESP=$(curl -sf -X POST http://localhost:8080/provision \
            -H 'Content-Type: application/json' \
            -d "{
              \"id_token\": \"$ID_TOKEN\",
              \"agent_id\": \"mock-agent\",
              \"scope\": \"invoke:completion\",
              \"ttl_seconds\": 300
            }")
          GRANT_TOKEN=$(echo "$GRANT_RESP" | jq -r '.delegation_token // empty')
          if [ -z "$GRANT_TOKEN" ]; then
            echo "ERROR: /provision did not return a delegation_token"
            echo "$GRANT_RESP"
            exit 1
          fi
          echo "GRANT_TOKEN=$GRANT_TOKEN" >> "$GITHUB_ENV"
        env:
          CI_OIDC_TOKEN: ${{ secrets.CI_OIDC_TOKEN }}

      - name: Fetch test JWT-SVID
        run: |
          set -euo pipefail
          AGENT_CTR=$(docker compose ps -q spire-agent 2>/dev/null | head -1)
          rm -f /tmp/svid.jwt /tmp/spire-fetch.out

          if [ -n "${AGENT_CTR}" ]; then
            docker exec "$AGENT_CTR" \
              /opt/spire/bin/spire-agent api fetch jwt \
              --spiffeID spiffe://kindred.systems/ns/examples/agent/mock \
              --audience kaif-conformance \
              --socketPath /run/spire/sockets/agent.sock \
              > /tmp/spire-fetch.out 2>/dev/null || true
          fi

          if [ -s /tmp/spire-fetch.out ]; then
            python3 -c 'import pathlib, re; text = pathlib.Path("/tmp/spire-fetch.out").read_text(); match = re.search(r"([A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+)", text); print(match.group(1) if match else "", end="")' > /tmp/svid.jwt
          fi

          if [ -s /tmp/svid.jwt ] && grep -Eq '^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$' /tmp/svid.jwt; then
            echo "Using SPIRE-issued JWT-SVID"
          elif [ -n "${CI_TEST_SVID_JWT:-}" ]; then
            echo "SPIRE did not yield a valid JWT-SVID — using pre-generated test SVID"
            printf '%s' "${CI_TEST_SVID_JWT}" > /tmp/svid.jwt
          else
            echo "ERROR: SPIRE did not yield a valid JWT-SVID and CI_TEST_SVID_JWT is not set"
            docker compose ps
            docker compose logs --tail=120 spire-server spire-init spire-agent || true
            if [ -f /tmp/spire-fetch.out ]; then
              echo "--- raw SPIRE fetch output ---"
              sed -n '1,40p' /tmp/spire-fetch.out
            fi
            exit 1
          fi

          if ! grep -Eq '^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+$' /tmp/svid.jwt; then
            echo "ERROR: /tmp/svid.jwt is not a clean JWT line"
            ls -l /tmp/svid.jwt
            sed -n '1,5p' /tmp/svid.jwt
            exit 1
          fi
        shell: bash
        env:
          CI_TEST_SVID_JWT: ${{ secrets.CI_TEST_SVID_JWT }}

      - name: Run conformance suite
        run: |
          set -euo pipefail
          node conformance/dist/runner/index.js \
            --server http://localhost:8080 \
            --svid-jwt /tmp/svid.jwt \
            --grant-token "$GRANT_TOKEN" \
            --agent-id spiffe://kindred.systems/ns/examples/agent/mock \
            --output json | tee conformance-result.json
        shell: bash
        env:
          GRANT_TOKEN: ${{ env.GRANT_TOKEN }}

      - name: Assert conformance passed
        run: |
          RESULT=$(jq -r '.result' conformance-result.json)
          if [ "$RESULT" != "PASS" ]; then
            echo "Conformance suite FAILED"
            jq '.fixtures[] | select(.result != "PASS")' conformance-result.json
            exit 1
          fi
          echo "Conformance suite PASSED"

      - name: Run Redis resilience conformance
        run: |
          node scripts/redis_resilience_conformance.mjs | tee redis-resilience-summary.txt
        shell: bash

      - name: Upload conformance result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-result-${{ github.sha }}
          path: conformance-result.json
          if-no-files-found: warn

      - name: Upload Redis resilience evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redis-resilience-${{ github.sha }}
          path: reports/redis_resilience/
          if-no-files-found: warn

      - name: Tear down stack
        if: always()
        run: docker compose down -v
