agent {
  data_dir          = "/run/spire/data"
  log_level         = "INFO"
  # Local production rehearsal uses the compose service name.
  # Real deployments should replace this with the real SPIRE server address.
  server_address    = "spire-server"
  server_port       = "8443"
  socket_path       = "/run/spire/sockets/agent.sock"
  trust_domain      = "kindred.systems"
  trust_bundle_path = "/run/spire/bootstrap/bundle.pem"

  # Choose one production bootstrap path and inject it at deploy time:
  # join_token = "REPLACE_WITH_SHORT_LIVED_JOIN_TOKEN"
  # upstream_authority = "aws_pca"
}

plugins {
  NodeAttestor "join_token" { plugin_data {} }
  KeyManager "disk" {
    plugin_data {
      directory = "/run/spire/data"
    }
  }
  WorkloadAttestor "unix" { plugin_data {} }
}
