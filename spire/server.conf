server {
  bind_address = "0.0.0.0"
  bind_port    = "8443"
  socket_path  = "/run/spire/server-sockets/api.sock"
  trust_domain = "kindred.systems"
  data_dir     = "/run/spire/data"
  log_level    = "INFO"
  jwt_issuer   = "spire-server"

  federation {
    bundle_endpoint {
      address = "0.0.0.0"
      port    = 8081
      # HTTP bundle endpoint consumed by kaif-server as KAIF_SPIRE_BUNDLE_ENDPOINT
    }
  }
}

plugins {
  DataStore "sql" {
    plugin_data {
      database_type     = "sqlite3"
      connection_string = "/run/spire/data/datastore.sqlite3"
    }
  }
  KeyManager "memory" { plugin_data {} }
  NodeAttestor "join_token" { plugin_data {} }
}
